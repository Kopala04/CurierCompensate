<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="Calculate venue pick-up, cancellation, and customer lateness compensation."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>MED CP Compensation Calculator</title>
  </head>
  <body>
    <div class="page">
      <div class="container">
        <header class="header">
          <h1>MED CP Compensation</h1>
          <p>Enter a value to see the result instantly.</p>
        </header>

        <div class="card">
          <div class="card-header">
            <span>Type</span>
            <span>Input</span>
            <span class="text-right">Result</span>
          </div>
          <div id="calculator-rows"></div>
        </div>
      </div>
    </div>

    <script src="calculator.js"></script>
    <script src="app.js"></script>
  </body>
</html>
